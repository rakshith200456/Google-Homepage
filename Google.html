<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="Google.css">
</head>
<body>
    <!-- navbar -->
    <header>
        <div class="navbar">
            <a class="one" href="https://mail.google.com/mail/u/o">Gmail</a>
            <a class="two" href="https://www.google.com/imghp?hl=en&tab=ri&authuser=0&ogbl">Images</a>
            <i id="come" class="fa-solid fa-flask"></i>
            <i id="la" class="fa-solid fa-grip"></i>
            <div class="circle">
                <p>V</p>
            </div>
        </div>
    </header>
    <content>
        <div class="logo">
            <img src="Google-removebg-preview.png" alt="Google logo">
        </div>
        <div class="share border">
            <button><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <div class="search-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input placeholder="Search Google or type a URL">
            <i class="fa-solid fa-microphone"></i>
            <i class="fa-solid fa-camera"></i>
            <button class="search-icon-one">
                <i class="fa-solid fa-magnifying-glass"></i>
                <p>AI MODE</p>
            </button>
        </div>
        <div class="outer">
            <div class="outer-inner">
                <p>Add Shortcut</p>
                <div class="inner">
                    <div class="plus"><i class="fa-solid fa-plus"></i></div>
                </div>
            </div>
        </div>
    </content>
    <!-- footer -->
     <footer>
        <button class="button border">
            <i class="fa-solid fa-pencil"></i>
            <p>Customize Chrome</p>
        </button>
     </footer>
</body>
